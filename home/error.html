<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg h-screen flex items-center justify-center text-white overflow-hidden">

    <div class="text-center px-4">
        <div class="relative inline-block float-animation mb-8">
            <h1 class="text-9xl font-extrabold tracking-widest animate__animated animate__zoomIn">404</h1>
            <div class="bg-[#FF6A3D] px-2 text-sm rounded rotate-12 absolute top-1/2 left-1/4 animate__animated animate__fadeInUp animate__delay-1s">
                Xerror
            </div>
        </div>

        <div class="animate__animated animate__fadeInUp animate__delay-1s">
            <h2 class="text-3xl font-semibold md:text-4xl mb-4">
                Looks like you're lost in space.
            </h2>
            <p class="text-lg text-indigo-100 mb-8 max-w-md mx-auto">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            
            <a href="/" class="relative inline-block px-8 py-3 font-medium group">
                <span class="absolute inset-0 w-full h-full transition duration-200 ease-out transform translate-x-1 translate-y-1 bg-white group-hover:-translate-x-0 group-hover:-translate-y-0"></span>
                <span class="absolute inset-0 w-full h-full bg-indigo-900 border-2 border-white group-hover:bg-indigo-700"></span>
                <span class="relative text-white group-hover:text-white">Back to Home</span>
            </a>
        </div>
    </div>

</body>
</html>
