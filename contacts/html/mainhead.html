<style>
       
        /* Header Container */
        .header-container {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Logo Styling */
        .header-logo {
            margin-right: 24px;
            flex-shrink: 0;
        }

        .header-logo img {
            width: 80px; /* Adjust size as needed */
            height: 80px;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Text Content Wrapper */
        .header-content {
            flex-grow: 1;
        }

        /* Main Title */
        .header-title {
            font-size: 28px;
            color: #1a202c;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        /* Subtitle */
        .header-subtitle {
            font-size: 16px;
            color: #4a5568;
            font-weight: 400;
            margin-bottom: 12px;
        }

        /* Meta Information Bar */
        .header-info {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #718096;
            border-top: 1px solid #e2e8f0;
            padding-top: 8px;
        }

        .info-item {
            display: flex;
            align-items: center;
        }

        /* Responsive Design for Small Screens */
        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                text-align: center;
            }

            .header-logo {
                margin-right: 0;
                margin-bottom: 16px;
            }

            .header-info {
                justify-content: center;
            }
        }
    </style>
<header class="header-container">
        <!-- Left Logo -->
        <div class="header-logo">
            <!-- Replace placeholder URL with your actual logo image path -->
            <img src="Xlogo" alt="XTitle">
        </div>

        <!-- Text Content -->
        <div class="header-content">
            <!-- Main Title -->
            <h1 class="header-title">XTitle</h1>
            
            <!-- Subtitle -->
            <p class="header-subtitle">XSubTitle</p>
            
        </div>
    </header>
