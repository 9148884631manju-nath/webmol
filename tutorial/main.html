<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <title>Documentation | WEBMOL Framework</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orchid: { 50: '#fdfaff', 100: '#f7f0ff', 200: '#ede0ff', 500: '#9d50bb', 600: '#6e48aa', 900: '#2d1b4d' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ede0ff; border-radius: 10px; }
        pre { background: #2d1b4d !important; color: #f7f0ff !important; padding: 1.5rem; border-radius: 1rem; overflow-x: auto; font-size: 0.875rem; }
        .code-keyword { color: #9d50bb; font-weight: bold; }
        .code-string { color: #50fa7b; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans antialiased">

    <header class="fixed top-0 z-30 w-full bg-white/80 backdrop-blur-md border-b border-orchid-100 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3" onclick="window.location='./'">
                <div class="w-8 h-8 bg-orchid-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">W</div>
                <h1 class="font-black text-xl tracking-tighter text-orchid-900 uppercase">WEBMOL <span class="text-orchid-500 font-medium lowercase text-sm">/ docs</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold text-orchid-500 bg-orchid-50 px-3 py-1 rounded-full uppercase">v1.0.4 Stable</span>
            </div>
        </div>
    </header>

    <div class="flex max-w-7xl mx-auto pt-20">
        
        <aside class="hidden md:block w-64 fixed h-[calc(100vh-5rem)] overflow-y-auto custom-scrollbar pr-4 py-8">
            <div class="space-y-8" id="mainlinks">
                <div>
                    <h5 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Getting Started</h5>
                    <ul class="space-y-3">
                        Xlinks
                    </ul>
                </div>
                <div>
                    <h5 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Molecular Logic</h5>
                    <ul class="space-y-3">
                        XYmorelinks
                    </ul>
                </div>
            </div>
        </aside>

        <main class="flex-1 md:ml-72 py-8 px-4 pb-24">
            <article class="max-w-3xl">
                XinnerPage
            </article>

            <footer class="mt-20 pt-10 border-t border-orchid-100">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        &copy; 2026 WEBMOL Framework • Open Source
                    </p>
                    <div class="flex gap-6">
                        <a href="#" class="text-[10px] font-bold text-orchid-500 uppercase hover:underline">GitHub</a>
                        <a href="#" class="text-[10px] font-bold text-orchid-500 uppercase hover:underline">Twitter</a>
                        <a href="#" class="text-[10px] font-bold text-orchid-500 uppercase hover:underline">Security</a>
                    </div>
                </div>
            </footer>
        </main>
    </div>

</body>
</html>
