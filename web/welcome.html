<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBMOL Framework</title>
    <style>
        :root {
            --accent: #ff3e00; /* Kinetic Orange */
            --dark: #050505;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Syncopate', sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 1. Animated Scanline Background */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* 2. Content Wrapper */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .framework-name {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 900;
            letter-spacing: -5px;
            line-height: 0.9;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            animation: glitch 3s infinite;
        }

        /* 3. The "MOL" Highlight */
        span.mol {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 62, 0, 0.5);
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--accent);
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        /* 4. Magnetic Button */
        .enter-btn {
            margin-top: 50px;
            padding: 15px 50px;
            border: 2px solid var(--white);
            background: transparent;
            color: var(--white);
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .enter-btn:hover {
            background: var(--white);
            color: var(--dark);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
        }

        /* 5. Animations */
        @keyframes glitch {
            0% { transform: skew(0deg); }
            1% { transform: skew(10deg); color: #00fff2; }
            2% { transform: skew(-10deg); color: #ff00c1; }
            3% { transform: skew(0deg); }
            100% { transform: skew(0deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Background Noise/Grid */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100px 100px;
            transform: perspective(500px) rotateX(60deg) translateY(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grid"></div>

    <div class="content">
        <div class="framework-name">
            WEB<span class="mol">MOL</span>
        </div>
        <p class="subtitle">DEVELOPMENT EVOLVED</p>
        <button class="enter-btn">INITIALIZE CORE</button>
    </div>

</body>
</html>
