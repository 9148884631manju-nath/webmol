<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBMOL | Development Framework</title>
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #0051ff;
            --bg: #020617;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b, transparent),
                radial-gradient(circle at 0% 100%, #0f172a, transparent);
        }

        /* 1. Main Branding Section */
        .hero {
            text-align: center;
            z-index: 10;
        }

        .logo-text {
            font-size: clamp(4rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.3));
            margin-bottom: 0.5rem;
        }

        .typewriter {
            font-family: 'Courier New', monospace;
            color: var(--primary);
            font-size: 1.2rem;
            border-right: 2px solid var(--primary);
            white-space: nowrap;
            overflow: hidden;
            margin: 0 auto;
            animation: typing 3.5s steps(40, end), blink .75s step-end infinite;
        }

        /* 2. Powered By Badge */
        .powered-by {
            margin-top: 2rem;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .powered-by span {
            color: #fff;
            font-weight: bold;
            border: 1px solid #334155;
            padding: 4px 12px;
            border-radius: 4px;
            margin-left: 10px;
        }

        /* 3. Credits Footer Card */
        .footer-card {
            position: absolute;
            bottom: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: slideUp 1s ease-out 0.5s both;
        }

        .designer-info {
            text-align: center;
        }

        .designer-info h3 {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .designer-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .contact-grid {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .contact-item {
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .contact-item:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        /* Animations */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--primary); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .contact-grid { flex-direction: column; gap: 5px; align-items: center; }
            .typewriter { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <main class="hero">
        <h1 class="logo-text">WEBMOL</h1>
        <div class="typewriter">Web App Development Framework</div>
        
        <p class="powered-by">X-Powered By <span>CODING-INFI</span></p>
    </main>

    <footer class="footer-card">
        <div class="designer-info">
            <h3>Designed & Developed By</h3>
            <div class="designer-name">Manjunath K</div>
        </div>
        
        <div class="contact-grid">
            <a href="tel:9343945143" class="contact-item">☏ 9343945143</a>
            <a href="mailto:manju9343945143@gmail.com" class="contact-item">✉ manju9343945143@gmail.com</a>
        </div>
    </footer>

</body>
</html>
